name: Viaduct
options:
  bundleIdPrefix: com.magicelk235
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.7"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Viaduct:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: AppIcon.icon
      - path: icon.png
        buildPhase: resources
      - path: Resources/cli
        type: folder
        buildPhase: resources
      - path: Resources/bin
        type: folder
        buildPhase: resources
    dependencies:
      - target: ViaductExtension
        embed: true
    info:
      path: Info.plist
      properties:
        CFBundleName: Viaduct
        CFBundleDisplayName: Viaduct
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "MIT"
        LSApplicationCategoryType: public.app-category.developer-tools
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - viaduct
            CFBundleURLName: com.magicelk235.viaduct
    entitlements:
      path: Viaduct.entitlements
      properties:
        # ponytail: NO app-sandbox. The app shells out to node/xcodebuild/lsregister/open;
        # the sandbox blocks exec of those binaries entirely, breaking the whole pipeline.
        # MAS distribution was never viable for a tool that drives the dev toolchain.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magicelk235.viaduct
        ENABLE_HARDENED_RUNTIME: false
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: Fetch Node
        # Download a self-contained node into Resources/bin/node so the shipped .app
        # carries its own runtime — the user never installs Node. Idempotent.
        script: "\"$SRCROOT/Resources/bin/fetch-node.sh\""
        basedOnDependencyAnalysis: false

  ViaductExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extension
    info:
      path: Extension/Info.plist
      properties:
        CFBundleName: ViaductExtension
        CFBundleDisplayName: Viaduct Extension
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "MIT"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: SafariWebExtensionHandler
    entitlements:
      path: Extension/ViaductExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.magicelk235.viaduct.Extension
        ENABLE_HARDENED_RUNTIME: false
        OTHER_LDFLAGS: ["-Xlinker", "-u", "-Xlinker", "_OBJC_CLASS_$_SafariWebExtensionHandler"]
